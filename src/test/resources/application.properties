# Test Configuration - Uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration
app.jwt.secret=test-secret-key-for-testing-purposes
app.jwt.expiration-ms=3600000

# OTP Configuration
app.otp.expiration-minutes=10
app.otp.max-requests-per-hour=5

# Logging
logging.level.root=WARN
logging.level.com.LoanManagement.WalletSystem=INFO

